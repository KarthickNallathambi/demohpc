<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:#0f172a;
    color:#fff;
}

/* Animated Background */

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    opacity:.8;
    animation:float 10s ease-in-out infinite alternate;
}

body::before{
    width:420px;
    height:420px;
    background:#2563eb;
    top:-120px;
    left:-100px;
}

body::after{
    width:380px;
    height:380px;
    background:#06b6d4;
    bottom:-120px;
    right:-100px;
    animation-delay:2s;
}

@keyframes float{

    from{
        transform:translate(0,0);
    }

    to{
        transform:translate(80px,60px);
    }

}

.card{

    position:relative;
    z-index:10;

    width:min(90%,700px);

    padding:70px 40px;

    text-align:center;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.1);

    border-radius:24px;

    backdrop-filter:blur(25px);

    box-shadow:0 30px 80px rgba(0,0,0,.35);

}

.icon{

    width:95px;
    height:95px;

    margin:auto auto 30px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:40px;

    background:linear-gradient(135deg,#2563eb,#06b6d4);

    box-shadow:0 15px 40px rgba(37,99,235,.4);

}

h1{

    font-size:72px;
    font-weight:800;
    letter-spacing:-2px;

}

p{

    margin-top:20px;

    font-size:18px;

    color:#cbd5e1;

    line-height:1.8;

}

@media(max-width:768px){

    .card{
        padding:50px 25px;
    }

    .icon{
        width:75px;
        height:75px;
        font-size:32px;
    }

    h1{
        font-size:46px;
    }

    p{
        font-size:16px;
    }

}

</style>
</head>
<body>

<div class="card">

    <div class="icon">
        <i class="fa-solid fa-rocket"></i>
    </div>

    <h1>Coming soon Ready</h1>

    <p>
        Our new website is currently under development.<br>
        We're working to deliver an exceptional experience.
    </p>

</div>

</body>
</html>
