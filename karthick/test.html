<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#0f172a,#1e3a8a,#0f766e,#111827);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

body::before{
    content:'';
    position:absolute;
    width:450px;
    height:450px;
    border-radius:50%;
    background:#3b82f680;
    filter:blur(120px);
    top:-120px;
    left:-120px;
    animation:float1 8s infinite alternate;
}

body::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    background:#06b6d480;
    filter:blur(120px);
    bottom:-150px;
    right:-120px;
    animation:float2 8s infinite alternate;
}

@keyframes float1{
    to{
        transform:translate(120px,80px);
    }
}

@keyframes float2{
    to{
        transform:translate(-100px,-80px);
    }
}

.container{
    width:90%;
    max-width:850px;
    padding:60px;
    text-align:center;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:30px;
    color:#fff;
    position:relative;
    z-index:10;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    animation:fade 1.2s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    width:80px;
    height:80px;
    margin:auto;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
    color:#2563eb;
    font-size:35px;
    margin-bottom:25px;
}

h1{
    font-size:60px;
    font-weight:800;
    margin-bottom:15px;
}

.highlight{
    color:#60a5fa;
}

p{
    color:#dbeafe;
    font-size:18px;
    line-height:1.7;
    margin-bottom:35px;
}

.countdown{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:40px;
}

.box{
    width:110px;
    padding:22px 10px;
    border-radius:18px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.1);
}

.box h2{
    font-size:38px;
    color:#fff;
}

.box span{
    display:block;
    margin-top:8px;
    font-size:14px;
    color:#cbd5e1;
    letter-spacing:1px;
}

.subscribe{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:35px;
}

.subscribe input{
    width:320px;
    max-width:100%;
    padding:15px 20px;
    border:none;
    outline:none;
    border-radius:50px;
    font-size:15px;
}

.subscribe button{
    padding:15px 30px;
    border:none;
    border-radius:50px;
    background:#2563eb;
    color:#fff;
    font-size:15px;
    cursor:pointer;
    transition:.3s;
}

.subscribe button:hover{
    background:#1d4ed8;
    transform:translateY(-3px);
}

.social{
    display:flex;
    justify-content:center;
    gap:18px;
}

.social a{
    width:48px;
    height:48px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
    text-decoration:none;
    color:#fff;
    background:rgba(255,255,255,.08);
    transition:.35s;
}

.social a:hover{
    background:#2563eb;
    transform:translateY(-6px);
}

footer{
    margin-top:35px;
    color:#cbd5e1;
    font-size:14px;
}

@media(max-width:768px){

.container{
padding:35px 20px;
}

h1{
font-size:42px;
}

.box{
width:90px;
}

.box h2{
font-size:28px;
}

p{
font-size:16px;
}

}
</style>

</head>
<body>

<div class="container">

<div class="logo">
<i class="fa-solid fa-rocket"></i>
</div>

<h1>Coming <span class="highlight">Soon</span></h1>

<p>
We're working hard to launch something amazing.<br>
Stay connected and we'll notify you once we're live.
</p>

<div class="countdown">

<div class="box">
<h2 id="days">00</h2>
<span>Days</span>
</div>

<div class="box">
<h2 id="hours">00</h2>
<span>Hours</span>
</div>

<div class="box">
<h2 id="minutes">00</h2>
<span>Minutes</span>
</div>

<div class="box">
<h2 id="seconds">00</h2>
<span>Seconds</span>
</div>

</div>

<div class="subscribe">
<input type="email" placeholder="Enter your email">
<button>Notify Me</button>
</div>

<div class="social">
<a href="#"><i class="fab fa-facebook-f"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-linkedin-in"></i></a>
<a href="#"><i class="fab fa-x-twitter"></i></a>
<a href="#"><i class="fab fa-github"></i></a>
</div>

<footer>
© 2026 Your Company. All Rights Reserved.
</footer>

</div>

<script>

// Launch Date
const launchDate = new Date("December 31, 2026 00:00:00").getTime();

function updateCountdown(){

const now = new Date().getTime();
const distance = launchDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("days").innerHTML = String(days).padStart(2,"0");
document.getElementById("hours").innerHTML = String(hours).padStart(2,"0");
document.getElementById("minutes").innerHTML = String(minutes).padStart(2,"0");
document.getElementById("seconds").innerHTML = String(seconds).padStart(2,"0");

if(distance<0){

clearInterval(timer);

document.querySelector(".countdown").innerHTML=
"<h2 style='font-size:40px;'>🎉 We Are Live!</h2>";

}

}

updateCountdown();

const timer=setInterval(updateCountdown,1000);

document.querySelector("button").addEventListener("click",()=>{

const email=document.querySelector("input").value.trim();

if(email===""){
alert("Please enter your email.");
return;
}

alert("Thank you! We'll notify you once we launch.");

document.querySelector("input").value="";

});

</script>

</body>
</html>
